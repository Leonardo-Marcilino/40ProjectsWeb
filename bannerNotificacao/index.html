<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banners de Notificação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Banners de Notificação</h2>

        <input type="checkbox" id="f1" class="fechar-check">
        <div class="banner sucesso">
            <i class="fa-solid fa-circle-check"></i>
            <p><strong>Sucesso!</strong> Seu cadastro foi realizado com sucesso.</p>
            <label for="f1"><i class="fa-solid fa-xmark"></i></label>
        </div>

        <input type="checkbox" id="f2" class="fechar-check">
        <div class="banner aviso">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <p><strong>Atenção!</strong> Sua sessão vai expirar em 5 minutos.</p>
            <label for="f2"><i class="fa-solid fa-xmark"></i></label>
        </div>

        <input type="checkbox" id="f3" class="fechar-check">
        <div class="banner erro">
            <i class="fa-solid fa-circle-xmark"></i>
            <p><strong>Erro!</strong> Não foi possível conectar ao servidor.</p>
            <label for="f3"><i class="fa-solid fa-xmark"></i></label>
        </div>

        <input type="checkbox" id="f4" class="fechar-check">
        <div class="banner info">
            <i class="fa-solid fa-circle-info"></i>
            <p><strong>Info:</strong> Uma nova versão do sistema está disponível.</p>
            <label for="f4"><i class="fa-solid fa-xmark"></i></label>
        </div>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <h2>Login</h2>

        <div class="campo">
            <input type="email" placeholder="Enter Your Email">
        </div>

        <div class="campo">
            <input type="password" placeholder="Enter Your Password">
        </div>

        <button class="continuar">Continue</button>

        <p class="ou">or Connect With Social Media</p>

        <a href="#" class="btn-social twitter">
            <i class="fa-brands fa-twitter"></i> Sign in With Twitter
        </a>

        <a href="#" class="btn-social facebook">
            <i class="fa-brands fa-facebook-f"></i> Sign in With Facebook
        </a>

    </div>

</body>
</html>

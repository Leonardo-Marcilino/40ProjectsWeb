<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barras de Habilidade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <div class="habilidade">
            <p>HTML</p>
            <div class="trilha">
                <div class="barra html">
                    <span class="badge">90%</span>
                </div>
            </div>
        </div>

        <div class="habilidade">
            <p>CSS</p>
            <div class="trilha">
                <div class="barra css">
                    <span class="badge">70%</span>
                </div>
            </div>
        </div>

        <div class="habilidade">
            <p>JavaScript</p>
            <div class="trilha">
                <div class="barra js">
                    <span class="badge">50%</span>
                </div>
            </div>
        </div>

        <div class="habilidade">
            <p>NodeJS</p>
            <div class="trilha">
                <div class="barra node">
                    <span class="badge">30%</span>
                </div>
            </div>
        </div>

    </div>

</body>
</html>

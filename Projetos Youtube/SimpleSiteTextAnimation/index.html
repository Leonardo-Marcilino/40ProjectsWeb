<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stuckify</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Stuckify<span>.</span></div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Latest</a>
            <a href="#">Category</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>

        <div class="busca">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search here...">
        </div>
    </header>

    <section class="hero">

        <div class="circulo esquerda"></div>

        <div class="circulo direita-laranja"></div>
        <div class="circulo direita-rosa"></div>
        <div class="circulo direita-lavanda"></div>

        <div class="texto">
            <p class="ola">Hello, It's Me</p>
            <h1>Hannah Lennon</h1>
            <p class="frase">
                And I'm a
                <span class="digitando">Youtuber, Blogger.</span>
            </p>
            <div class="botoes">
                <a href="#" class="btn">About Me</a>
                <a href="#" class="btn">Follow Me</a>
            </div>
        </div>

        <div class="redes">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
            <a href="#"><i class="fa-brands fa-pinterest-p"></i></a>
        </div>

    </section>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="vitrine">

        <div class="card">
            <div class="img-box">
                <img src="https://picsum.photos/250/200?random=71" alt="Produto">
                <span class="tag">-20%</span>
            </div>
            <div class="info">
                <h3>Tênis Esportivo</h3>
                <div class="estrelas">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                    <i class="fa-regular fa-star"></i>
                    <span>(128)</span>
                </div>
                <div class="preco">
                    <span class="antigo">R$ 299</span>
                    <span class="atual">R$ 239</span>
                </div>
                <button><i class="fa-solid fa-cart-plus"></i> Adicionar</button>
            </div>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="https://picsum.photos/250/200?random=72" alt="Produto">
                <span class="tag">Novo</span>
            </div>
            <div class="info">
                <h3>Mochila Urbana</h3>
                <div class="estrelas">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i>
                    <span>(89)</span>
                </div>
                <div class="preco">
                    <span class="atual">R$ 189</span>
                </div>
                <button><i class="fa-solid fa-cart-plus"></i> Adicionar</button>
            </div>
        </div>

        <div class="card">
            <div class="img-box">
                <img src="https://picsum.photos/250/200?random=73" alt="Produto">
                <span class="tag">-35%</span>
            </div>
            <div class="info">
                <h3>Óculos de Sol</h3>
                <div class="estrelas">
                    <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                    <i class="fa-solid fa-star"></i><i class="fa-regular fa-star"></i>
                    <i class="fa-regular fa-star"></i>
                    <span>(52)</span>
                </div>
                <div class="preco">
                    <span class="antigo">R$ 180</span>
                    <span class="atual">R$ 117</span>
                </div>
                <button><i class="fa-solid fa-cart-plus"></i> Adicionar</button>
            </div>
        </div>

    </div>

</body>
</html>

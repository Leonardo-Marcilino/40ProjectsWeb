<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Perfil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <div class="capa"></div>
        <div class="avatar">
            <img src="https://picsum.photos/90/90?random=42" alt="Avatar">
        </div>
        <div class="info">
            <h2>Leonardo Marcilino</h2>
            <p>Front-end Developer · São Paulo, SP</p>
        </div>
        <div class="stats">
            <div><strong>124</strong><span>Posts</span></div>
            <div><strong>3.4k</strong><span>Seguidores</span></div>
            <div><strong>218</strong><span>Seguindo</span></div>
        </div>
        <div class="acoes">
            <a href="#" class="btn-seguir">Seguir</a>
            <a href="#" class="btn-msg"><i class="fa-solid fa-message"></i></a>
        </div>
    </div>

</body>
</html>

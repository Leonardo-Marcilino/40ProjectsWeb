<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso Circular</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Habilidades</h2>
        <div class="circulos">

            <div class="item">
                <div class="circulo c-html">
                    <span>90%</span>
                </div>
                <p>HTML</p>
            </div>

            <div class="item">
                <div class="circulo c-css">
                    <span>75%</span>
                </div>
                <p>CSS</p>
            </div>

            <div class="item">
                <div class="circulo c-js">
                    <span>55%</span>
                </div>
                <p>JavaScript</p>
            </div>

            <div class="item">
                <div class="circulo c-design">
                    <span>65%</span>
                </div>
                <p>Design</p>
            </div>

        </div>
    </div>

</body>
</html>

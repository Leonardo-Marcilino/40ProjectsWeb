<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagem com Overlay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="galeria">

        <div class="foto">
            <img src="https://picsum.photos/400/300?random=11" alt="Natureza">
            <div class="overlay">
                <i class="fa-solid fa-tree"></i>
                <h3>Natureza</h3>
                <p>Paisagens incríveis</p>
            </div>
        </div>

        <div class="foto">
            <img src="https://picsum.photos/400/300?random=22" alt="Cidade">
            <div class="overlay">
                <i class="fa-solid fa-city"></i>
                <h3>Cidade</h3>
                <p>Vida urbana</p>
            </div>
        </div>

        <div class="foto">
            <img src="https://picsum.photos/400/300?random=33" alt="Tecnologia">
            <div class="overlay">
                <i class="fa-solid fa-laptop-code"></i>
                <h3>Tecnologia</h3>
                <p>Inovação digital</p>
            </div>
        </div>

        <div class="foto">
            <img src="https://picsum.photos/400/300?random=44" alt="Arte">
            <div class="overlay">
                <i class="fa-solid fa-palette"></i>
                <h3>Arte</h3>
                <p>Criatividade sem limites</p>
            </div>
        </div>

    </div>

</body>
</html>

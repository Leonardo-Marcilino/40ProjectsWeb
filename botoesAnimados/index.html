<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Animados</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Botões CSS</h2>

        <div class="grupo">
            <button class="btn b-preenchido">Preenchido</button>
            <button class="btn b-borda">Com Borda</button>
            <button class="btn b-sombra">Com Sombra</button>
            <button class="btn b-gradiente">Gradiente</button>
            <button class="btn b-icon"><i class="fa-solid fa-rocket"></i> Com Ícone</button>
            <button class="btn b-pulsar">Pulsando</button>
        </div>
    </div>

</body>
</html>

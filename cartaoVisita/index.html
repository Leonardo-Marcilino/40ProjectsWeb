<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Visita</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cartao">
        <div class="avatar">
            <img src="https://picsum.photos/100/100?random=10" alt="Foto">
        </div>
        <h2>Leonardo Marcilino</h2>
        <p class="cargo">Desenvolvedor Front-end</p>
        <div class="divider"></div>
        <div class="info">
            <p><i class="fa-solid fa-envelope"></i> leo@email.com</p>
            <p><i class="fa-solid fa-phone"></i> (11) 99999-9999</p>
            <p><i class="fa-solid fa-location-dot"></i> São Paulo, SP</p>
        </div>
        <div class="redes">
            <a href="#"><i class="fa-brands fa-github"></i></a>
            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </div>
    </div>

</body>
</html>

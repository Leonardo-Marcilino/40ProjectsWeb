<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tooltips</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Passe o mouse nos botões</h2>

        <div class="botoes">

            <div class="tip" data-dica="Compartilhar com amigos!">
                <button class="btn azul"><i class="fa-solid fa-share-nodes"></i> Compartilhar</button>
            </div>

            <div class="tip" data-dica="Salvar no favoritos">
                <button class="btn amarelo"><i class="fa-solid fa-star"></i> Favoritar</button>
            </div>

            <div class="tip" data-dica="Baixar o arquivo agora">
                <button class="btn verde"><i class="fa-solid fa-download"></i> Baixar</button>
            </div>

            <div class="tip" data-dica="Excluir permanentemente!">
                <button class="btn vermelho"><i class="fa-solid fa-trash"></i> Deletar</button>
            </div>

        </div>
    </div>

</body>
</html>
